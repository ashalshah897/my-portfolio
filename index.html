<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Syed Raza | DevOps Portfolio</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .role { color: #94a3b8; font-weight: 500; margin-bottom: 20px; display: block; }
        .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .skill-badge { background: #0ea5e9; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        #status { font-size: 0.8rem; margin-top: 20px; color: #10b981; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="name">Loading...</h1>
        <span class="role" id="role">Fetching Profile...</span>
        <div class="skills-container" id="skills"></div>
        <p id="status">● Backend Connected</p>
    </div>

    <script>
        fetch('http://localhost:3000/api/info')
            .then(res => res.json())
            .then(data => {
                document.getElementById('name').innerText = data.name;
                document.getElementById('role').innerText = data.role;
                const skillsDiv = document.getElementById('skills');
                data.skills.forEach(skill => {
                    let span = document.createElement('span');
                    span.className = 'skill-badge';
                    span.innerText = skill;
                    skillsDiv.appendChild(span);
                });
            })
            .catch(err => {
                document.getElementById('name').innerText = "Connection Error";
                document.getElementById('status').style.color = "#ef4444";
                document.getElementById('status').innerText = "● Backend Offline";
            });
    </script>
</body>
</html>
