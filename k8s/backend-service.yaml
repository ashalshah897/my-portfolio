apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend-service
spec:
  type: NodePort  # Exposes the port outside the cluster
  selector:
    app: portfolio-backend  # This links the service to your deployment pods!
  ports:
    - port: 3000        # Internal port inside the cluster
      targetPort: 3000  # Port running inside your container
      nodePort: 30080   # The exact port we will use to visit it in our browser!
